# One-command setup:
#   conda env create -f environment.yml     (run from the repo root)
#   conda activate tiff2mp4
# then:  tiff2mp4-gui         (the window)   or   tiff2mp4 <folder> --limit 20   (headless)
name: tiff2mp4
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - tifffile
  - imagecodecs        # tifffile needs this to decode LZW/compressed Squid TIFFs
  - pip
  - pip:
      - imageio[ffmpeg]
      - PyQt5
      - "."          # tiff2mp4 itself (installs the tiff2mp4 / tiff2mp4-gui commands)
